<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segunda Aula HTML</title>
    <style>
        body{

            background-image: url('/assets/Floresta.jpg');
            background-repeat: no-repeat; /* Impede que a imagem de fundo se repita */
            background-size: cover; /* Faz com que a imagem de fundo cubra toda a área da página */
            background-attachment: fixed; /* Faz com que a imagem de fundo fique fixa enquanto o conteúdo rola */
            background-color: rgb(250, 180, 227);
            color: #90b; /* muda a cor da fonte */
            font-size: 20px; /* aumenta o tamanho da fonte */
            font-family: verdana; /* muda a fonte para Verdana */
            text-align: center; /* centraliza o texto */

        }

        h1{

            background-color: #f09; /* muda a cor de fundo do título */
            color: #000000;
            font-weight: normal; /* coloca ou remove a negrito do título */

        }

        p{

            background-color: beige;
            text-align: justify; /* alinha o texto à esquerda e à direita */
            width: 300px;
            height: 150px;
            margin: 50px; /* Determina o tamanho da margem ao redor do parágrafo */
            margin-left: 300px; /* Determina o tamanho da margem à esquerda do parágrafo */
            padding: 20px; /* Define o preenchimento interno do parágrafo */
            border: 5px; /* Define a largura da borda do parágrafo */
            border-style: solid; /* Define o estilo da borda do parágrafo */
            border-color: #000000;
            border-radius: 10px; /* Define o raio da borda do parágrafo para torná-la arredondada */

        }

        img{

            width: 400px; /* Define a largura da imagem */
            height: 200px; /* Define a altura da imagem */
            margin-top: 50px; /* Define a margem superior da imagem */
            border: 10px dotted rgb(39, 230, 255);

        }

        hr{
            width: 50%; /* Define a largura da linha horizontal */
            height: 5px; /* Define a altura da linha horizontal */
            background-color: #90b; /* Define a cor de fundo da linha horizontal */

        }

    </style>
</head>
<body>
    <h1> Testando títulos na página </h1>
     <p>Olá, esta é a segunda aula de HTML. <br /> Hoje vamos aprender sobre imagens, parágrados, hr que é uma linha horizontal e h1 que é um título de nível 1.</p>
     <hr /> <!-- Linha horizontal para separar seções -->

     <img src="/assets/gato.jpg" />

     <div>
        <a href="/02-atividades/08-atividade-relativos/atividade8.html">
            Retornar para a página anterior
        </a>
     </div>

</body>
</html>
