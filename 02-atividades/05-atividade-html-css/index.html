<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de HTML com CSS</title>
    <style>

        body{

            background-color: rgb(0, 0, 89);
            background-image: url('assets/fundo3.jpg');
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: 1400px 840px;
            background-position: center;

        }

        h1{

            background-color: black;
            color: white;
            text-align: center;
            font-family: 'Verdana';

        }

        p{

            background-color: black;
            color: white;
            font-family: verdana;
            font-size: 20px;
        }

        h2{

            background-color: black;
            color: white;
            text-align: center;
            font-family: Verdana;

        }

        a {
            color: #3498db; /* Cor do link */
            display: block; /* Faz o link ocupar a linha toda */
            width: fit-content; /* Ajusta a largura ao tamanho do texto */
            margin: 0 auto; /* Centraliza o bloco na horizontal */
        }

    </style>
</head>
<body>
    <h1>Exercício de HTML com CSS</h1>
    <p>Tags principais</p>
    <p>Headings</p>
    <p>Tag de paragrafos</p>
    <p>Tag de imagens</p>
    <p>Folha de estilos</p>
    <p>Atributos e classes</p>
    <p>Trabalhando com imagens de background</p>
    <p>Formatação de conteúdo no HTML</p>
    <h2>Curso de Projeto WEB SENAC - SP</h2>
    <a href="">Click para folha de estilos</a>

</body>
</html>
